<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Subscription Manager</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="app">

    <!-- Toolbar -->
    <div class="toolbar">
      <button class="btn btn--toolbar" id="btn-sync" title="Sync Subscriptions">
        <svg class="icon" viewBox="0 0 24 24"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/></svg>
        <span class="btn__label" id="btn-sync-text">Sync</span>
      </button>
      <button class="btn btn--toolbar" id="btn-add-folder" title="Add Folder">
        <svg class="icon" viewBox="0 0 24 24"><path d="M20 6h-8l-2-2H4c-1.11 0-1.99.89-1.99 2L2 18c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-1 8h-3v3h-2v-3h-3v-2h3V9h2v3h3v2z"/></svg>
        <span class="btn__label">Add Folder</span>
      </button>
      <div class="toolbar__spacer"></div>
      <div class="view-toggle" id="view-toggle" title="Switch view mode">
        <button class="view-toggle__btn active" data-view="list" title="List view">
          <svg class="icon" viewBox="0 0 24 24"><path fill="currentColor" d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
        </button>
        <button class="view-toggle__btn" data-view="grid" title="Grid view">
          <svg class="icon" viewBox="0 0 24 24"><path fill="currentColor" d="M3 3v8h8V3H3zm6 6H5V5h4v4zm-6 4v8h8v-8H3zm6 6H5v-4h4v4zm4-16v8h8V3h-8zm6 6h-4V5h4v4zm-6 4v8h8v-8h-8zm6 6h-4v-4h4v4z"/></svg>
        </button>
      </div>
      <button class="btn btn--toolbar" id="btn-sign-out" title="Sign Out" style="display:none;">
        <svg class="icon" viewBox="0 0 24 24"><path fill="currentColor" d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
        <span class="btn__label">Sign Out</span>
      </button>
    </div>

    <!-- Search Bar -->
    <div class="search-bar">
      <svg class="search-bar__icon" viewBox="0 0 24 24"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      <input type="text" id="search-input" class="search-bar__input" placeholder="Search channels..." />
    </div>

    <!-- Add Folder Modal -->
    <div class="modal-overlay" id="modal-add-folder">
      <div class="modal">
        <div class="modal__header">
          <h2 class="modal__title">Add Folder</h2>
          <button class="modal__close" data-close-modal="modal-add-folder">&times;</button>
        </div>
        <div class="modal__body">
          <div class="form-group">
            <label for="input-folder-name">Folder Name</label>
            <input type="text" id="input-folder-name" class="input" placeholder="e.g. Gaming" />
          </div>
          <div class="form-group form-group--inline">
            <label for="input-folder-color">Folder Color</label>
            <input type="color" id="input-folder-color" class="input-color" value="#FF0000" />
          </div>
        </div>
        <div class="modal__footer">
          <button class="btn btn--ghost" data-close-modal="modal-add-folder">Cancel</button>
          <button class="btn btn--primary" id="btn-confirm-add-folder">Add</button>
        </div>
      </div>
    </div>

    <!-- Rename Folder Modal -->
    <div class="modal-overlay" id="modal-rename-folder">
      <div class="modal">
        <div class="modal__header">
          <h2 class="modal__title">Rename Folder</h2>
          <button class="modal__close" data-close-modal="modal-rename-folder">&times;</button>
        </div>
        <div class="modal__body">
          <div class="form-group">
            <label for="input-rename-folder">New Name</label>
            <input type="text" id="input-rename-folder" class="input" placeholder="e.g. Music" />
          </div>
        </div>
        <div class="modal__footer">
          <button class="btn btn--ghost" data-close-modal="modal-rename-folder">Cancel</button>
          <button class="btn btn--primary" id="btn-confirm-rename-folder">Rename</button>
        </div>
      </div>
    </div>

    <!-- Unsubscribe Confirmation Modal -->
    <div class="modal-overlay" id="modal-unsubscribe">
      <div class="modal">
        <div class="modal__header">
          <h2 class="modal__title">Unsubscribe</h2>
          <button class="modal__close" data-close-modal="modal-unsubscribe">&times;</button>
        </div>
        <div class="modal__body">
          <p class="modal__text">Remove <strong id="unsubscribe-channel-name"></strong> from your list? The channel page will open so you can unsubscribe on YouTube.</p>
        </div>
        <div class="modal__footer">
          <button class="btn btn--ghost" data-close-modal="modal-unsubscribe">Cancel</button>
          <button class="btn btn--primary btn--danger-fill" id="btn-confirm-unsubscribe">Remove & Open</button>
        </div>
      </div>
    </div>

    <!-- Main Content -->
    <main class="content" id="content">
      <!-- Loading State -->
      <div class="loading-state" id="loading-state" style="display:none;">
        <div class="spinner"></div>
        <p class="loading-state__text">Syncing subscriptions...</p>
      </div>

      <!-- Empty State -->
      <div class="empty-state" id="empty-state">
        <svg class="empty-state__icon" viewBox="0 0 24 24"><path d="M18 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 4h5v8l-2.5-1.5L6 12V4z"/></svg>
        <p class="empty-state__text">No subscriptions yet</p>
        <p class="empty-state__hint">Click "Sync" to load your YouTube subscriptions</p>
      </div>
    </main>
  </div>

  <script type="module" src="../../dist/sidepanel/sidepanel.js"></script>
</body>
</html>
