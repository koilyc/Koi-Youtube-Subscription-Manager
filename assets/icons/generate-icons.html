<!-- 
  Open this file in a browser to generate icon PNGs.
  Right-click each canvas and "Save Image As" to save as icon16.png, icon48.png, icon128.png.
-->
<!DOCTYPE html>
<html>
<body>
<h3>Koi Icon Generator - Right-click each canvas to save</h3>
<div>
  <p>16x16:</p><canvas id="c16" width="16" height="16"></canvas>
  <p>48x48:</p><canvas id="c48" width="48" height="48"></canvas>
  <p>128x128:</p><canvas id="c128" width="128" height="128"></canvas>
</div>
<script>
function drawIcon(canvas) {
  const ctx = canvas.getContext('2d');
  const s = canvas.width;
  
  // Background - YouTube red rounded rect
  ctx.fillStyle = '#FF0000';
  const r = s * 0.2;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(s - r, 0);
  ctx.quadraticCurveTo(s, 0, s, r);
  ctx.lineTo(s, s - r);
  ctx.quadraticCurveTo(s, s, s - r, s);
  ctx.lineTo(r, s);
  ctx.quadraticCurveTo(0, s, 0, s - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.fill();
  
  // Letter K
  ctx.fillStyle = '#FFFFFF';
  ctx.font = `bold ${s * 0.55}px Arial`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('K', s / 2, s / 2 + s * 0.02);
}

['c16', 'c48', 'c128'].forEach(id => drawIcon(document.getElementById(id)));
</script>
</body>
</html>
